<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClauuGon</title>

    <!-- ⚡ Script para aplicar el tema guardado antes de que React cargue -->
    <script>
      // Si el usuario tiene dark mode guardado en localStorage, lo aplicamos
      if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark');
      }
    </script>
  </head>
  <body class="bg-white text-gray-800 dark:bg-stone-900 dark:text-white">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
